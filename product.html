<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRODUCT - ARCETYPE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
            color: #e8e8e8;
            overflow-x: hidden;
            min-height: 100vh;
        }

        h1, h2, h3 {
            font-family: 'Arial Black', sans-serif;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 1.5rem 2rem;
            background: rgba(13, 13, 13, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #2a2a2a;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: auto;
        }

        .brand-name {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 0.2em;
            color: #f5f5f5;
            text-decoration: none;
            font-family: 'Arial Black', sans-serif;
        }

        nav {
            display: flex;
            gap: 2rem;
        }

        nav a {
            color: #e8e8e8;
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            transition: color 0.3s;
            border-bottom: 2px solid transparent;
            padding-bottom: 0.25rem;
        }

        nav a:hover {
            color: #ff3333;
            border-bottom-color: #ff3333;
        }

        @media (max-width: 768px) {
            .brand-name {
                font-size: 1.1rem;
            }

            header {
                padding: 1rem 1rem;
            }

            nav {
                gap: 0.75rem;
            }

            nav a {
                font-size: 0.65rem;
            }
        }

        .product-container {
            margin-top: 100px;
            padding: 3rem 2rem;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        .back-link {
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            margin-bottom: 2rem;
            display: inline-block;
            transition: all 0.3s;
        }

        .back-link:hover {
            color: #ff3333;
        }

        .product-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            margin-bottom: 4rem;
        }

        .product-images {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .main-image {
            width: 100%;
            aspect-ratio: 1;
            background: #0d0d0d;
            border: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            font-size: 1.2rem;
            letter-spacing: 0.1em;
        }

        .product-details {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .product-title {
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 900;
            letter-spacing: 0.15em;
            color: #f5f5f5;
        }

        .product-price {
            font-size: 2rem;
            color: #ff3333;
            letter-spacing: 0.05em;
            font-weight: 700;
        }

        .product-description {
            font-size: 1rem;
            line-height: 1.8;
            color: #888;
            letter-spacing: 0.05em;
        }

        .size-selector {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .size-label {
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            color: #888;
        }

        .size-options {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .size-option {
            background: transparent;
            border: 2px solid #3a3a3a;
            color: #e8e8e8;
            padding: 0.75rem 1.5rem;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Courier New', monospace;
        }

        .size-option:hover {
            border-color: #ff3333;
        }

        .size-option.selected {
            background: #ff3333;
            border-color: #ff3333;
            color: #fff;
        }

        .add-to-cart {
            background: #ff3333;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 1.25rem 2rem;
            font-size: 1rem;
            letter-spacing: 0.2em;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Arial Black', sans-serif;
            text-transform: uppercase;
            margin-top: 2rem;
        }

        .add-to-cart:hover {
            background: #ff0000;
            box-shadow: 0 10px 40px rgba(255, 51, 51, 0.6);
        }

        .add-to-cart:disabled {
            background: #3a3a3a;
            color: #666;
            cursor: not-allowed;
            box-shadow: none;
        }

        .sold-out-badge {
            background: rgba(255, 51, 51, 0.9);
            color: #fff;
            padding: 1rem 2rem;
            font-size: 1rem;
            letter-spacing: 0.2em;
            font-weight: bold;
            text-align: center;
            margin-top: 2rem;
        }

        @media (max-width: 968px) {
            .product-layout {
                grid-template-columns: 1fr;
                gap: 2rem;
            }

            .product-container {
                padding: 2rem 1rem;
                margin-top: 80px;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="brand-name">ARCETYPE</a>
        <nav>
            <a href="index.html">CANVAS</a>
            <a href="archive.html">ARCHIVE</a>
            <a href="index.html#about">ABOUT</a>
            <a href="index.html#insiders">INSIDERS</a>
        </nav>
    </header>

    <div class="product-container">
        <a href="archive.html" class="back-link">← BACK TO ARCHIVE</a>

        <div class="product-layout">
            <div class="product-images">
                <div class="main-image">
                    PRODUCT IMAGE
                </div>
            </div>

            <div class="product-details">
                <h1 class="product-title" id="productName">VINTAGE TEE 001</h1>
                <div class="product-price" id="productPrice">$45</div>
                
                <p class="product-description" id="productDescription">
                    Premium vintage-washed tee. Soft, comfortable, and built to last. 
                    Express yourself. Define your archetype.
                </p>

                <div class="size-selector">
                    <div class="size-label">SELECT SIZE</div>
                    <div class="size-options">
                        <button class="size-option" data-size="S">S</button>
                        <button class="size-option" data-size="M">M</button>
                        <button class="size-option" data-size="L">L</button>
                        <button class="size-option" data-size="XL">XL</button>
                    </div>
                </div>

                <button class="add-to-cart" id="addToCart">ADD TO CART</button>
                
                <!-- Show this instead if sold out -->
                <!-- <div class="sold-out-badge">SOLD OUT</div> -->
            </div>
        </div>
    </div>

    <script>
        // Size selection
        const sizeOptions = document.querySelectorAll('.size-option');
        const addToCartBtn = document.getElementById('addToCart');
        let selectedSize = null;

        sizeOptions.forEach(option => {
            option.addEventListener('click', () => {
                sizeOptions.forEach(opt => opt.classList.remove('selected'));
                option.classList.add('selected');
                selectedSize = option.dataset.size;
                addToCartBtn.disabled = false;
            });
        });

        // Add to cart
        addToCartBtn.addEventListener('click', () => {
            if (!selectedSize) {
                alert('Please select a size');
                return;
            }
            
            // TODO: Shopify Buy Button integration
            alert(`Added to cart: ${document.getElementById('productName').textContent} - Size ${selectedSize}`);
        });

        // Disable add to cart initially
        addToCartBtn.disabled = true;

        // TODO: Load product data from URL parameter or Shopify
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        
        // You'll replace this with actual Shopify product data
        if (productId) {
            console.log('Loading product ID:', productId);
        }
    </script>
</body>
</html>
